version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "StrongP@ssw0rd1"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: db-init
    restart: "no"
    depends_on:
      - sqlserver
    entrypoint: /bin/bash
    command: -c "until /opt/mssql-tools/bin/sqlcmd -S sqlserver -U SA -P \"StrongP@ssw0rd1\" -Q 'SELECT 1' 2>/dev/null; do sleep 2; done; /opt/mssql-tools/bin/sqlcmd -S sqlserver -U SA -P \"StrongP@ssw0rd1\" -Q \"IF DB_ID('demodb') IS NULL CREATE DATABASE demodb;\""

volumes:
  mssql-data:
